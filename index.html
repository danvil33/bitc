<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitC Network | Mobile Mining Reimagined</title>
  <meta name="description" content="BitC Network is a mobile-first digital currency experience built for simple, secure, energy-light participation." />
  <meta name="theme-color" content="#4b148c" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --primary: #4b148c;
      --primary-2: #7c3aed;
      --gold: #f5b942;
      --dark: #12051f;
      --text: #172033;
      --muted: #667085;
      --line: rgba(75, 20, 140, 0.12);
      --soft: #fbf8ff;
      --white: #ffffff;
      --shadow: 0 24px 70px rgba(18, 5, 31, 0.14);
      --radius: 28px;
      --max: 1180px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.18), transparent 38%),
        radial-gradient(circle at top right, rgba(245, 185, 66, 0.18), transparent 32%),
        #fff;
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    .container { max-width: var(--max); margin: 0 auto; padding: 0 22px; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: rgba(255, 255, 255, 0.82);
      border-bottom: 1px solid rgba(75, 20, 140, 0.08);
    }
    .nav-inner {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: -0.04em;
      font-size: 1.1rem;
    }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #fff2b2 36%, var(--primary-2));
      display: grid;
      place-items: center;
      box-shadow: 0 12px 30px rgba(75, 20, 140, 0.26);
      color: var(--primary);
      font-weight: 950;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav-links a {
      padding: 10px 14px;
      border-radius: 999px;
      color: #4d5364;
      font-weight: 800;
      font-size: 0.92rem;
    }
    .nav-links a:hover { background: rgba(75, 20, 140, 0.08); color: var(--primary); }
    .actions { display: flex; align-items: center; gap: 10px; }
    .btn {
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 18px;
      border-radius: 999px;
      font-weight: 900;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 18px 34px rgba(75, 20, 140, 0.25);
    }
    .btn-secondary {
      color: var(--primary);
      background: #fff;
      border: 1px solid var(--line);
    }
    .menu-btn { display: none; width: 46px; height: 46px; padding: 0; }

    .mobile-menu {
      display: none;
      padding: 0 22px 18px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.94);
    }
    .mobile-menu.open { display: block; }
    .mobile-menu a {
      display: block;
      padding: 13px 0;
      font-weight: 850;
      color: var(--text);
      border-bottom: 1px solid rgba(75,20,140,.08);
    }

    .hero { padding: 80px 0 52px; }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 48px;
      align-items: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(75, 20, 140, 0.08);
      color: var(--primary);
      border: 1px solid rgba(75, 20, 140, 0.12);
      font-weight: 900;
      font-size: .86rem;
    }
    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 8px rgba(245,185,66,.18);
    }
    h1 {
      margin-top: 22px;
      font-size: clamp(2.55rem, 6vw, 5.6rem);
      line-height: .95;
      letter-spacing: -0.075em;
      color: var(--dark);
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--primary), var(--primary-2), #d99a20);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .lead {
      margin-top: 24px;
      max-width: 640px;
      color: #555d70;
      font-size: 1.12rem;
      font-weight: 600;
    }
    .hero-buttons { margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; }
    .trust-row {
      margin-top: 34px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 610px;
    }
    .trust-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,.78);
    }
    .trust-card strong { display: block; color: var(--dark); font-size: 1.15rem; letter-spacing: -.04em; }
    .trust-card span { color: var(--muted); font-size: .86rem; font-weight: 700; }

    .phone-wrap {
      position: relative;
      min-height: 580px;
      display: grid;
      place-items: center;
    }
    .orbit {
      position: absolute;
      width: min(520px, 90vw);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(124,58,237,.22), transparent 58%),
        conic-gradient(from 120deg, rgba(75,20,140,.1), rgba(245,185,66,.28), rgba(124,58,237,.16), rgba(75,20,140,.1));
      filter: blur(.1px);
      animation: rotate 18s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    .phone {
      position: relative;
      z-index: 2;
      width: min(330px, 78vw);
      min-height: 640px;
      border-radius: 46px;
      padding: 14px;
      background: linear-gradient(145deg, #251034, #0f051b);
      box-shadow: 0 38px 90px rgba(18, 5, 31, 0.34);
      border: 1px solid rgba(255,255,255,.16);
    }
    .screen {
      min-height: 612px;
      border-radius: 36px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(245,185,66,.24), transparent 36%),
        linear-gradient(180deg, #4b148c, #1d0731 70%);
      color: #fff;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .screen-top { display: flex; justify-content: space-between; align-items: center; font-size: .82rem; font-weight: 800; opacity: .9; }
    .coin {
      width: 184px;
      height: 184px;
      margin: 44px auto 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff9d1, var(--gold) 38%, #9c6b12 78%);
      display: grid;
      place-items: center;
      color: var(--primary);
      font-size: 4.2rem;
      font-weight: 950;
      box-shadow: inset 0 10px 18px rgba(255,255,255,.45), 0 20px 50px rgba(0,0,0,.28);
    }
    .mining-card {
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 26px;
      padding: 18px;
      backdrop-filter: blur(14px);
    }
    .mining-card h3 { font-size: 1.45rem; letter-spacing: -.05em; }
    .progress {
      margin: 18px 0 10px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      overflow: hidden;
    }
    .progress span { display: block; width: 72%; height: 100%; background: linear-gradient(90deg, var(--gold), #fff2b2); border-radius: inherit; }
    .mine-btn {
      margin-top: 16px;
      width: 100%;
      background: #fff;
      color: var(--primary);
      box-shadow: none;
    }
    .float-card {
      position: absolute;
      z-index: 3;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      font-weight: 900;
    }
    .float-card small { display: block; color: var(--muted); font-weight: 700; }
    .float-card.one { left: 10px; top: 110px; }
    .float-card.two { right: 4px; bottom: 118px; }

    .section { padding: 74px 0; }
    .section-head { text-align: center; max-width: 760px; margin: 0 auto 34px; }
    .eyebrow { color: var(--primary); font-weight: 950; text-transform: uppercase; letter-spacing: .12em; font-size: .78rem; }
    h2 { margin-top: 10px; font-size: clamp(2rem, 4vw, 3.4rem); line-height: 1.04; letter-spacing: -.06em; color: var(--dark); }
    .section-head p { margin-top: 16px; color: var(--muted); font-weight: 600; }

    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .card {
      padding: 28px;
      background: rgba(255,255,255,.84);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 45px rgba(18, 5, 31, 0.07);
    }
    .icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: rgba(75,20,140,.09);
      color: var(--primary);
      font-size: 1.45rem;
      margin-bottom: 18px;
    }
    .card h3 { color: var(--dark); font-size: 1.2rem; letter-spacing: -.04em; }
    .card p { margin-top: 9px; color: var(--muted); font-weight: 600; }

    .split {
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      gap: 28px;
      align-items: center;
      padding: 38px;
      border-radius: 36px;
      background: linear-gradient(135deg, var(--primary), #211034);
      color: #fff;
      overflow: hidden;
      position: relative;
    }
    .split:before {
      content: "";
      position: absolute;
      width: 420px;
      aspect-ratio: 1;
      right: -110px;
      top: -120px;
      border-radius: 50%;
      background: rgba(245,185,66,.2);
    }
    .split h2, .split p { color: #fff; position: relative; }
    .split p { opacity: .78; margin-top: 14px; font-weight: 600; }
    .steps { display: grid; gap: 14px; position: relative; }
    .step { display: flex; gap: 14px; padding: 18px; border-radius: 24px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.16); }
    .step span { width: 36px; height: 36px; border-radius: 50%; background: var(--gold); color: var(--primary); display: grid; place-items: center; font-weight: 950; flex: 0 0 auto; }
    .step strong { display: block; }
    .step small { color: rgba(255,255,255,.72); font-weight: 600; }

    .download {
      padding: 72px 0;
      background: var(--soft);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .download-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
    }
    .store-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .store {
      min-width: 172px;
      padding: 14px 18px;
      border-radius: 18px;
      background: #111827;
      color: #fff;
      font-weight: 950;
      text-align: center;
    }
    .store.light { background: #fff; color: var(--primary); border: 1px solid var(--line); }

    footer { padding: 44px 0; background: #fff; }
    .footer-grid { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center; color: var(--muted); font-weight: 650; }
    .footer-links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: flex-end; }
    .footer-links a { font-weight: 850; color: var(--text); }

    @media (max-width: 920px) {
      .nav-links, .actions .desktop-only { display: none; }
      .menu-btn { display: inline-flex; }
      .hero { padding-top: 48px; }
      .hero-grid, .split, .download-box, .footer-grid { grid-template-columns: 1fr; }
      .phone-wrap { min-height: 620px; }
      .cards { grid-template-columns: 1fr; }
      .trust-row { grid-template-columns: 1fr; }
      .footer-links { justify-content: flex-start; }
    }

    @media (max-width: 560px) {
      .container { padding: 0 16px; }
      .hero-buttons .btn, .store { width: 100%; }
      .phone { width: min(300px, 88vw); min-height: 590px; }
      .screen { min-height: 562px; }
      .coin { width: 150px; height: 150px; font-size: 3.4rem; }
      .float-card { display: none; }
      .split { padding: 24px; border-radius: 28px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const features = [
      { icon: "⚡", title: "Energy-light mining", text: "Participate from your phone without expensive equipment or heavy electricity use." },
      { icon: "🔒", title: "Trust-focused design", text: "A cleaner experience with clear education, safety guidance, and simple onboarding." },
      { icon: "🌍", title: "Built for everyone", text: "Mobile-first access designed for everyday users, communities, and future digital payments." }
    ];

    const ecosystem = [
      { icon: "📱", title: "Mobile App", text: "A simple app experience for mining sessions, balance visibility, and user progress." },
      { icon: "🧩", title: "Developer Ecosystem", text: "Future-ready tools for apps, integrations, merchants, and community products." },
      { icon: "🤝", title: "Community Growth", text: "Grow BitC with ambassadors, education, support, and verified announcements." }
    ];

    function Header() {
      const [open, setOpen] = useState(false);
      const links = ["How it works", "Ecosystem", "Roadmap", "Download"];
      return (
        <header className="nav">
          <div className="container nav-inner">
            <a href="#home" className="brand" aria-label="BitC Network home">
              <span className="logo">B</span>
              <span>BitC Network</span>
            </a>
            <nav className="nav-links" aria-label="Primary navigation">
              {links.map(link => <a key={link} href={`#${link.toLowerCase().replaceAll(' ', '-')}`}>{link}</a>)}
            </nav>
            <div className="actions">
              <a className="btn btn-secondary desktop-only" href="#roadmap">Whitepaper</a>
              <a className="btn btn-primary desktop-only" href="#download">Start Mining</a>
              <button className="btn btn-secondary menu-btn" onClick={() => setOpen(!open)} aria-label="Toggle menu">☰</button>
            </div>
          </div>
          <div className={`mobile-menu ${open ? 'open' : ''}`}>
            {links.map(link => <a key={link} onClick={() => setOpen(false)} href={`#${link.toLowerCase().replaceAll(' ', '-')}`}>{link}</a>)}
            <a onClick={() => setOpen(false)} href="#download">Start Mining</a>
          </div>
        </header>
      );
    }

    function Hero() {
      return (
        <section id="home" className="hero">
          <div className="container hero-grid">
            <div>
              <div className="badge"><span className="pulse"></span> Mobile-first digital currency</div>
              <h1>Mine crypto from your phone with <span className="gradient-text">BitC Network</span>.</h1>
              <p className="lead">
                A professional, simple, and community-powered mining experience inspired by the future of accessible digital currency.
              </p>
              <div className="hero-buttons">
                <a href="#download" className="btn btn-primary">Download App</a>
                <a href="#how-it-works" className="btn btn-secondary">How it works</a>
              </div>
              <div className="trust-row">
                <div className="trust-card"><strong>Mobile</strong><span>No mining rigs needed</span></div>
                <div className="trust-card"><strong>Simple</strong><span>Tap daily to participate</span></div>
                <div className="trust-card"><strong>Community</strong><span>Grow with pioneers</span></div>
              </div>
            </div>

            <div className="phone-wrap" aria-label="BitC app preview">
              <div className="orbit"></div>
              <div className="float-card one">+72%<small>Mining progress</small></div>
              <div className="float-card two">Secure<small>Mobile network</small></div>
              <div className="phone">
                <div className="screen">
                  <div className="screen-top"><span>BitC</span><span>● Live</span></div>
                  <div>
                    <div className="coin">B</div>
                    <div className="mining-card">
                      <h3>Mining active</h3>
                      <p>Next session refreshes in 23h 42m</p>
                      <div className="progress"><span></span></div>
                      <button className="btn mine-btn">Boost Network</button>
                    </div>
                  </div>
                  <div className="screen-top"><span>Balance: 128.45 BITC</span><span>Tier 01</span></div>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Card({ icon, title, text }) {
      return (
        <article className="card">
          <div className="icon">{icon}</div>
          <h3>{title}</h3>
          <p>{text}</p>
        </article>
      );
    }

    function HowItWorks() {
      return (
        <section id="how-it-works" className="section">
          <div className="container">
            <div className="section-head">
              <div className="eyebrow">How it works</div>
              <h2>Crypto participation made clean, simple, and mobile.</h2>
              <p>BitC is positioned around daily mobile engagement, community growth, and a professional digital currency experience.</p>
            </div>
            <div className="cards">
              {features.map(item => <Card key={item.title} {...item} />)}
            </div>
          </div>
        </section>
      );
    }

    function Ecosystem() {
      return (
        <section id="ecosystem" className="section">
          <div className="container">
            <div className="section-head">
              <div className="eyebrow">Ecosystem</div>
              <h2>Build more than a coin. Build a useful network.</h2>
              <p>Prepare BitC for real adoption through apps, education, merchant tools, and community-first growth.</p>
            </div>
            <div className="cards">
              {ecosystem.map(item => <Card key={item.title} {...item} />)}
            </div>
          </div>
        </section>
      );
    }

    function Roadmap() {
      return (
        <section id="roadmap" className="section">
          <div className="container split">
            <div>
              <div className="eyebrow" style={{color: '#f5b942'}}>Roadmap</div>
              <h2>From mobile mining to real ecosystem utility.</h2>
              <p>Use this section to show serious direction: app release, community verification, ecosystem tools, and public launch phases.</p>
              <div className="hero-buttons">
                <a href="#download" className="btn btn-primary">Join Early</a>
                <a href="mailto:danvilchain@gmail.com" className="btn btn-secondary">Contact Team</a>
              </div>
            </div>
            <div className="steps">
              <div className="step"><span>1</span><div><strong>Mobile Mining App</strong><small>Launch clean onboarding and daily mining sessions.</small></div></div>
              <div className="step"><span>2</span><div><strong>Community Verification</strong><small>Grow trusted users, ambassadors, and safety education.</small></div></div>
              <div className="step"><span>3</span><div><strong>Ecosystem Utility</strong><small>Introduce apps, partners, merchants, and developer tools.</small></div></div>
            </div>
          </div>
        </section>
      );
    }

    function Download() {
      return (
        <section id="download" className="download">
          <div className="container download-box">
            <div>
              <div className="eyebrow">Download</div>
              <h2>Start your BitC mining journey today.</h2>
              <p className="lead">Replace the buttons with your real Play Store and App Store links when your app is ready.</p>
            </div>
            <div className="store-row">
              <a className="store" href="#">Google Play</a>
              <a className="store light" href="#">App Store</a>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer>
          <div className="container footer-grid">
            <div className="brand"><span className="logo">B</span><span>BitC Network</span></div>
            <div className="footer-links">
              <a href="#how-it-works">How it works</a>
              <a href="#ecosystem">Ecosystem</a>
              <a href="#roadmap">Roadmap</a>
              <a href="mailto:danvilchain@gmail.com">Contact</a>
            </div>
            <p>© {new Date().getFullYear()} BitC Network. All rights reserved.</p>
          </div>
        </footer>
      );
    }

    function App() {
      return (
        <>
          <Header />
          <main>
            <Hero />
            <HowItWorks />
            <Ecosystem />
            <Roadmap />
            <Download />
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
