<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitC Network | Mobile Digital Currency Platform</title>
  <meta name="description" content="BitC Network is a professional mobile-first digital currency platform for secure, simple, energy-light participation." />
  <meta name="theme-color" content="#312d2a" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{
      --oracle-red:#c74634;
      --oracle-red-dark:#8f2f23;
      --ink:#1f1a17;
      --text:#312d2a;
      --muted:#6f6761;
      --cream:#f7f3ef;
      --cream-2:#eee7df;
      --line:#ded6ce;
      --card:#ffffff;
      --black:#000000;
      --max:1220px;
      --shadow:0 20px 50px rgba(49,45,42,.12);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:var(--cream);
      line-height:1.55;
    }
    a{text-decoration:none;color:inherit}
    button{font:inherit}
    .container{max-width:var(--max);margin:0 auto;padding:0 24px}

    .top-strip{
      background:#161513;
      color:#fff;
      font-size:.84rem;
    }
    .top-strip .container{
      min-height:38px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }
    .quick-links{display:flex;align-items:center;gap:18px;flex-wrap:wrap;color:#e5ded7;font-weight:700}
    .quick-links a:hover{color:#fff;text-decoration:underline}

    .nav{
      position:sticky;
      top:0;
      z-index:50;
      background:#312d2a;
      color:#fff;
      border-bottom:1px solid rgba(255,255,255,.1);
    }
    .nav-inner{
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:22px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:900;
      letter-spacing:-.04em;
      font-size:1.2rem;
      white-space:nowrap;
    }
    .logo{
      width:92px;
      height:32px;
      border:2px solid #fff;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-weight:950;
      letter-spacing:-.06em;
    }
    .nav-links{display:flex;align-items:center;gap:4px}
    .nav-links a{
      padding:12px 14px;
      color:#eee7df;
      font-weight:800;
      font-size:.92rem;
      border-radius:3px;
    }
    .nav-links a:hover{background:rgba(255,255,255,.1);color:#fff}
    .nav-actions{display:flex;align-items:center;gap:10px}
    .icon-btn,.menu-btn{
      border:1px solid rgba(255,255,255,.24);
      background:transparent;
      color:#fff;
      width:42px;height:42px;
      border-radius:4px;
      display:grid;place-items:center;
      cursor:pointer;
      font-weight:900;
    }
    .menu-btn{display:none}
    .mobile-menu{display:none;background:#312d2a;border-top:1px solid rgba(255,255,255,.12);padding:8px 24px 18px}
    .mobile-menu.open{display:block}
    .mobile-menu a{display:block;padding:13px 0;color:#fff;font-weight:800;border-bottom:1px solid rgba(255,255,255,.12)}

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:11px 18px;
      border-radius:4px;
      border:1px solid transparent;
      font-weight:900;
      cursor:pointer;
      transition:background .18s ease,transform .18s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-red{background:var(--oracle-red);color:#fff;border-color:var(--oracle-red)}
    .btn-red:hover{background:var(--oracle-red-dark)}
    .btn-outline{background:transparent;color:var(--text);border-color:var(--text)}
    .btn-light{background:#fff;color:var(--text);border-color:#fff}
    .btn-dark{background:#312d2a;color:#fff;border-color:#312d2a}

    .hero{
      background:
        linear-gradient(90deg,rgba(247,243,239,.98) 0%,rgba(247,243,239,.92) 48%,rgba(247,243,239,.2) 100%),
        radial-gradient(circle at 82% 42%,rgba(199,70,52,.24),transparent 28%),
        linear-gradient(135deg,#f7f3ef,#ded6ce);
      border-bottom:1px solid var(--line);
    }
    .hero-grid{
      min-height:600px;
      display:grid;
      grid-template-columns:1.04fr .96fr;
      align-items:center;
      gap:46px;
      padding:72px 0;
    }
    .kicker{
      font-weight:950;
      color:var(--oracle-red);
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:.78rem;
      margin-bottom:18px;
    }
    h1{
      font-size:clamp(2.55rem,5.6vw,5.45rem);
      line-height:.98;
      letter-spacing:-.075em;
      color:var(--ink);
      max-width:740px;
    }
    .lead{
      margin-top:22px;
      max-width:660px;
      font-size:1.16rem;
      font-weight:600;
      color:#4f4843;
    }
    .hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:30px}
    .hero-side{
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      min-height:440px;
      display:grid;
      grid-template-rows:auto 1fr;
    }
    .side-head{
      padding:24px 26px;
      background:#312d2a;
      color:#fff;
    }
    .side-head h3{font-size:1.6rem;letter-spacing:-.04em}
    .side-body{padding:26px;display:grid;gap:16px;background:#fff}
    .metric{border-bottom:1px solid var(--line);padding-bottom:16px}
    .metric strong{font-size:2rem;letter-spacing:-.06em;color:var(--ink);display:block}
    .metric span{color:var(--muted);font-weight:700}

    .section{padding:72px 0;border-bottom:1px solid var(--line)}
    .section.white{background:#fff}
    .section-head{max-width:820px;margin-bottom:34px}
    .section-head h2{
      margin-top:8px;
      color:var(--ink);
      font-size:clamp(2rem,4vw,3.5rem);
      line-height:1.04;
      letter-spacing:-.065em;
    }
    .section-head p{margin-top:14px;color:var(--muted);font-weight:650;font-size:1.04rem}

    .oracle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
    .product-card{
      background:#fff;
      border:1px solid var(--line);
      padding:24px;
      min-height:250px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition:box-shadow .18s ease,transform .18s ease;
    }
    .product-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
    .product-card h3{font-size:1.22rem;letter-spacing:-.035em;color:var(--ink)}
    .product-card p{margin-top:10px;color:var(--muted);font-weight:600}
    .learn{margin-top:22px;color:var(--oracle-red);font-weight:950}

    .feature-split{
      display:grid;
      grid-template-columns:.9fr 1.1fr;
      gap:0;
      border:1px solid var(--line);
      background:#fff;
    }
    .feature-panel{padding:42px;background:#312d2a;color:#fff;display:flex;flex-direction:column;justify-content:center}
    .feature-panel h2{font-size:clamp(2rem,4vw,3.35rem);line-height:1.04;letter-spacing:-.06em;color:#fff}
    .feature-panel p{margin-top:16px;color:#e5ded7;font-weight:600}
    .feature-list{padding:32px;background:#fff;display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .mini-card{border:1px solid var(--line);padding:22px;background:#fbfaf8}
    .mini-card h3{color:var(--ink);letter-spacing:-.035em}
    .mini-card p{margin-top:8px;color:var(--muted);font-weight:600}

    .news-row{display:grid;grid-template-columns:1.2fr .8fr;gap:22px}
    .news-main,.news-side{background:#fff;border:1px solid var(--line);padding:30px}
    .news-main h3{font-size:2.1rem;line-height:1.05;letter-spacing:-.06em;color:var(--ink)}
    .news-main p,.news-side p{margin-top:12px;color:var(--muted);font-weight:600}
    .news-side{display:grid;gap:18px}
    .news-item{border-bottom:1px solid var(--line);padding-bottom:18px}
    .news-item:last-child{border-bottom:0;padding-bottom:0}
    .news-item strong{display:block;color:var(--ink);font-size:1.08rem;letter-spacing:-.03em}

    .cta{
      background:#1f1a17;
      color:#fff;
      padding:70px 0;
    }
    .cta-grid{display:grid;grid-template-columns:1fr auto;gap:28px;align-items:center}
    .cta h2{font-size:clamp(2rem,4vw,3.5rem);line-height:1.04;letter-spacing:-.065em;color:#fff}
    .cta p{margin-top:14px;color:#d8d0c8;font-weight:600;max-width:720px}
    .cta-actions{display:flex;gap:12px;flex-wrap:wrap}

    footer{background:#312d2a;color:#eee7df;padding:40px 0}
    .footer-grid{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
    .footer-links{display:flex;gap:18px;flex-wrap:wrap;justify-content:flex-end;font-weight:800}
    .footer-links a:hover{text-decoration:underline}
    .copyright{margin-top:12px;color:#cfc6be;font-size:.9rem}

    @media(max-width:980px){
      .nav-links,.desktop-only{display:none}.menu-btn{display:grid}
      .hero-grid,.feature-split,.news-row,.cta-grid,.footer-grid{grid-template-columns:1fr}
      .oracle-grid{grid-template-columns:1fr 1fr}
      .hero-grid{min-height:auto;padding:52px 0}
      .footer-links{justify-content:flex-start}
    }
    @media(max-width:620px){
      .container{padding:0 16px}.top-strip .container{align-items:flex-start;flex-direction:column;padding-top:10px;padding-bottom:10px}
      .oracle-grid,.feature-list{grid-template-columns:1fr}
      .hero-actions .btn,.cta-actions .btn{width:100%}
      .side-head,.side-body,.feature-panel,.news-main,.news-side{padding:24px}
      .logo{width:76px}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const products = [
      { title: "BitC Mobile Mining", text: "A mobile-first mining experience designed for simple daily participation without expensive hardware." },
      { title: "BitC Secure Wallet", text: "A future-ready wallet layer for balances, account safety, and user identity protection." },
      { title: "BitC Data Platform", text: "Insights for network growth, adoption, transactions, and community activity." },
      { title: "BitC Developer Cloud", text: "Tools for developers and partners to build useful services around the BitC ecosystem." }
    ];

    const features = [
      { title: "Energy-light by design", text: "Built around mobile participation, not heavy mining rigs or complex setup." },
      { title: "User-friendly onboarding", text: "Clear app flows help new users understand mining, safety, and next steps." },
      { title: "Community ecosystem", text: "Ambassadors, verified updates, and education help the network grow responsibly." },
      { title: "Business-ready direction", text: "A professional structure for future merchants, partners, and developer integrations." }
    ];

    function Header(){
      const [open,setOpen]=useState(false);
      const links=["Infrastructure","Applications","Ecosystem","Developers","Download"];
      return <>
        <div className="top-strip">
          <div className="container">
            <span>BitC Network</span>
            <div className="quick-links">
              <a href="#infrastructure">Cloud</a>
              <a href="#applications">Wallet</a>
              <a href="#ecosystem">AI</a>
              <a href="mailto:danvilchain@gmail.com">Contact</a>
            </div>
          </div>
        </div>
        <header className="nav">
          <div className="container nav-inner">
            <a className="brand" href="#home" aria-label="BitC home"><span className="logo">BitC</span></a>
            <nav className="nav-links" aria-label="Primary navigation">
              {links.map(link=><a key={link} href={`#${link.toLowerCase()}`}>{link}</a>)}
            </nav>
            <div className="nav-actions">
              <button className="icon-btn desktop-only" aria-label="Search">⌕</button>
              <a className="btn btn-red desktop-only" href="#download">Start free</a>
              <button className="menu-btn" onClick={()=>setOpen(!open)} aria-label="Open menu">☰</button>
            </div>
          </div>
          <div className={`mobile-menu ${open?'open':''}`}>
            {links.map(link=><a key={link} onClick={()=>setOpen(false)} href={`#${link.toLowerCase()}`}>{link}</a>)}
            <a onClick={()=>setOpen(false)} href="mailto:danvilchain@gmail.com">Contact</a>
          </div>
        </header>
      </>;
    }

    function Hero(){
      return <section id="home" className="hero">
        <div className="container hero-grid">
          <div>
            <div className="kicker">BitC Digital Currency Infrastructure</div>
            <h1>Enterprise-grade mobile mining for the next digital economy.</h1>
            <p className="lead">BitC Network brings a clean, secure, mobile-first way to participate in digital currency—built with a professional ecosystem approach for users, communities, developers, and partners.</p>
            <div className="hero-actions">
              <a className="btn btn-red" href="#download">Start mining</a>
              <a className="btn btn-outline" href="#infrastructure">Explore BitC platform</a>
            </div>
          </div>
          <aside className="hero-side">
            <div className="side-head">
              <div className="kicker" style={{color:'#f7c7bd',marginBottom:8}}>Network preview</div>
              <h3>BitC mobile platform</h3>
            </div>
            <div className="side-body">
              <div className="metric"><strong>Mobile</strong><span>Mine from your phone</span></div>
              <div className="metric"><strong>Secure</strong><span>Account-first user experience</span></div>
              <div className="metric"><strong>Global</strong><span>Community-powered growth</span></div>
              <a className="btn btn-dark" href="#download">Download app</a>
            </div>
          </aside>
        </div>
      </section>;
    }

    function ProductCard({title,text}){
      return <article className="product-card"><div><h3>{title}</h3><p>{text}</p></div><a className="learn" href="#download">Learn more →</a></article>;
    }

    function Infrastructure(){
      return <section id="infrastructure" className="section white">
        <div className="container">
          <div className="section-head">
            <div className="kicker">Infrastructure</div>
            <h2>BitC platform services for mobile crypto participation</h2>
            <p>Inspired by enterprise software structure: clear products, clear value, and serious positioning.</p>
          </div>
          <div className="oracle-grid">{products.map(p=><ProductCard key={p.title} {...p}/>)}</div>
        </div>
      </section>;
    }

    function Applications(){
      return <section id="applications" className="section">
        <div className="container feature-split">
          <div className="feature-panel">
            <div className="kicker" style={{color:'#f7c7bd'}}>Applications</div>
            <h2>One mobile experience for mining, wallet, education, and community.</h2>
            <p>BitC can grow from a simple mining app into a complete digital currency ecosystem with useful services.</p>
            <div className="hero-actions"><a className="btn btn-light" href="#download">Get started</a></div>
          </div>
          <div className="feature-list">{features.map(f=><div className="mini-card" key={f.title}><h3>{f.title}</h3><p>{f.text}</p></div>)}</div>
        </div>
      </section>;
    }

    function Ecosystem(){
      return <section id="ecosystem" className="section white">
        <div className="container">
          <div className="section-head">
            <div className="kicker">Ecosystem</div>
            <h2>AI, community, and data tools for future network utility</h2>
            <p>Position BitC as more than a coin: a platform for user growth, verified communication, business adoption, and developer innovation.</p>
          </div>
          <div className="news-row">
            <article className="news-main">
              <div className="kicker">Featured</div>
              <h3>Build a trusted mobile crypto network before scaling utility.</h3>
              <p>Focus on onboarding, safety education, verified announcements, and user confidence. This makes the project look serious and investment-ready.</p>
              <div className="hero-actions"><a className="btn btn-red" href="#download">Join the network</a><a className="btn btn-outline" href="mailto:danvilchain@gmail.com">Partner with us</a></div>
            </article>
            <aside className="news-side">
              <div className="news-item"><strong>Developer tools</strong><p>Prepare APIs, documentation, and partner dashboards.</p></div>
              <div className="news-item"><strong>Merchant adoption</strong><p>Create a future path for payments and business usage.</p></div>
              <div className="news-item"><strong>Community trust</strong><p>Use official channels, education, and clear safety policies.</p></div>
            </aside>
          </div>
        </div>
      </section>;
    }

    function Developers(){
      return <section id="developers" className="section">
        <div className="container">
          <div className="section-head">
            <div className="kicker">Developers</div>
            <h2>Prepare BitC for apps, agents, dashboards, and partner integrations</h2>
            <p>A strong technology brand needs clear developer direction. This section can later connect to documentation, APIs, whitepaper, and GitHub.</p>
          </div>
          <div className="oracle-grid">
            <ProductCard title="API Roadmap" text="Plan future endpoints for wallet data, user sessions, verification, and partner activity." />
            <ProductCard title="Documentation" text="Explain mining, wallet safety, ecosystem rules, and technical architecture." />
            <ProductCard title="Partner Portal" text="A future area for merchants, ambassadors, and verified businesses." />
            <ProductCard title="AI Support" text="Use AI assistants to guide users, detect scams, and answer platform questions." />
          </div>
        </div>
      </section>;
    }

    function Download(){
      return <section id="download" className="cta">
        <div className="container cta-grid">
          <div>
            <div className="kicker" style={{color:'#f7c7bd'}}>Get started</div>
            <h2>Start building the BitC community today.</h2>
            <p>Replace these buttons with real app store links when your mobile app is ready. Until then, use them for waitlist, Telegram, or WhatsApp onboarding.</p>
          </div>
          <div className="cta-actions">
            <a className="btn btn-red" href="#">Google Play</a>
            <a className="btn btn-light" href="#">App Store</a>
          </div>
        </div>
      </section>;
    }

    function Footer(){
      return <footer>
        <div className="container footer-grid">
          <div>
            <div className="brand"><span className="logo">BitC</span></div>
            <div className="copyright">© {new Date().getFullYear()} BitC Network. All rights reserved.</div>
          </div>
          <div className="footer-links">
            <a href="#infrastructure">Infrastructure</a>
            <a href="#applications">Applications</a>
            <a href="#ecosystem">Ecosystem</a>
            <a href="mailto:danvilchain@gmail.com">Contact</a>
          </div>
        </div>
      </footer>;
    }

    function App(){
      return <><Header/><main><Hero/><Infrastructure/><Applications/><Ecosystem/><Developers/><Download/></main><Footer/></>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
